<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="crypto.css">
    <title>Crypto Dashboard</title>
     <script src="https://kit.fontawesome.com/a6df8c915e.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <nav class="side-bar">
        <header>
            <div class="text-logo">
                <a href="#" class="logo-title">
                    <span>Cryptooz</span>
                </a>
            </div>
        </header>

        <div class="main">
            <div class="main-content">
                <li class="search-container">
                    <i class="fa-solid fa-magnifying-glass fa-lg"></i>
                    <input type="search" class="search" placeholder="Search...">
                </li>

                <ul>
                    <li class="list-item">
                        <a href="#">
                            <i class="fa-solid fa-chart-area fa-lg"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="list-item">
                        <a href="#">
                            <i class="fa-sharp fa-regular fa-basket-shopping-simple fa-lg"></i>
                            <span>Market</span>
                        </a>
                    </li>
                    <li class="list-item">
                        <a href="#">
                            <i class="fa-regular fa-newspaper fa-lg"></i>
                            <span>News</span>
                        </a>
                    </li>
                    <li class="list-item">
                        <a href="#">
                            <i class="fa-regular fa-gear fa-lg"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="bottom-content">
                <li class="list-item">
                        <a href="#">
                            <i class="fa-solid fa-arrow-left-from-line fa-lg"></i>
                            <span>Log out</span>
                        </a>
                    </li>

                    <li class="mode">
                        <div class="moon-sun">
                            <i class="fa-regular fa-sun fa-sm sun"></i>
                            <i class="fa-regular fa-moon fa-sm moon"></i>
                        </div>
                        <span class="mode-text text">Dark Mode</span>
                        <div class="toggle-switch">
                            <span class="switch">
                            </span>
                        </div>
                    </li>
                
            </div>


        </div>
        
    </nav>
    
    

    <script src="crypto.js" defer></script>

</body>
</html>
